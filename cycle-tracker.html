<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycle Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="index.html" class="back-link">&larr; Back</a>
    <div class="page">
      <h1>🌙 Cycle Tracker</h1>

      <div class="tracker-section">
        <label>Last period start date:</label>
        <input type="date" id="lastPeriodDate" />
        <label>Average cycle length (days):</label>
        <input type="number" id="cycleLength" value="28" />
        <button onclick="saveCycleInfo()" class="reset-button">Save</button>
        <p id="cycleEstimate"></p>
      </div>

      <div class="snack-note">
        🚧 Snacks will be available after your boyfriend gets a job 🚧
      </div>

      <div class="budget-section">
        <label>Set monthly budget: $</label>
        <input type="number" id="budgetInput" step="0.01" />
        <button onclick="saveBudget()" class="reset-button">Save Budget</button>
        <p>Budget: $<span id="budgetTotal">0.00</span></p>
        <p>Remaining: $<span id="budgetRemaining">0.00</span></p>
      </div>

      <div class="snack-list">
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 6.0)" />
          Homemade Spring Rolls — $6.00
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 4.5)" />
          Crispy M&Ms — $4.29
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 12.0)" />
          Sushi — $12.00
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 8.0)" />
          8 Chicken Nuggets — $5.00
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 7.5)" />
          Sticky Date Pudding — $5.00
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 4.0)" />
          Redbull — $3.49
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 4.5)" />
          Chips — $2.00
        </label>
        <label class="snack-item">
          <input type="checkbox" onchange="toggleSnack(this, 6.0)" />
          Hot Chips — $6.00
        </label>
      </div>

      <div class="suggestion-box">
        <label>Suggest something else:</label>
        <input
          type="text"
          id="suggestionInput"
          placeholder="Type a snack idea..."
        />
        <button onclick="saveSuggestion()" class="reset-button">Submit</button>
      </div>
    </div>

    <script src="cycle-tracker.js"></script>
  </body>
</html>
